<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arulz-XD API - Pastebin</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css" rel="stylesheet" />
    <style>
        :root { 
            --bg-main: #f5f4ef; 
            --border-dark: #000000; 
            --yellow: #ffde00; 
            --orange: #ff6b00; 
        }

        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: var(--bg-main);
            background-image: radial-gradient(rgba(0, 0, 0, 0.15) 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            color: #000; 
            margin: 0; 
            padding: 0; 
            font-weight: bold; 
            padding-top: 85px; 
        }

        /* Kontainer Tombol Utama di Pojok Kiri Atas */
        .top-left-nav {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .btn-nav-top {
            background: #ffffff;
            color: #000000;
            border: 3px solid #000000;
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000000;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: transform 0.05s, box-shadow 0.05s;
        }
        .btn-nav-top:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000000;
        }
        .btn-nav-top.accent {
            background: var(--yellow);
        }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; box-sizing: border-box; min-height: 400px; }

        .hero-banner { background: #fff; border: 4px solid #000; box-shadow: 8px 8px 0px #000; padding: 35px; margin-bottom: 35px; position: relative; }
        .hero-tag { background: var(--yellow); border: 3px solid #000; display: inline-block; padding: 4px 12px; font-size: 12px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .hero-tag::before { content: "● "; color: #555; }
        .hero-banner h1 { margin: 0 0 20px 0; font-size: 36px; font-weight: 900; color: #000; }
        .hero-banner h1 span { background: var(--yellow); padding: 2px 8px; border: 3px solid #000; margin-right: 5px; }
        .hero-banner p { margin: 0 0 10px 0; color: #444; font-size: 14px; font-weight: bold; line-height: 1.6; max-width: 700px; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); border: 4px solid #000; background: #fff; box-shadow: 8px 8px 0px #000; margin-bottom: 35px; }
        .stat-box { padding: 25px; background: white; box-sizing: border-box; }
        .stat-box.left { border-right: 4px solid #000; background: var(--yellow); }
        .stat-box.center { border-right: 4px solid #000; }
        .stat-box h2 { margin: 0 0 5px 0; font-size: 38px; font-weight: 900; color: #000; font-family: Arial, sans-serif; }
        .stat-box p { margin: 0; font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 900; }

        .search-wrapper { position: relative; margin-bottom: 15px; }
        .search-input { width: 100%; padding: 16px 16px 16px 45px; font-size: 14px; border: 4px solid #000; box-shadow: 4px 4px 0px #000; box-sizing: border-box; background: #fff; font-weight: bold; font-family: inherit; }
        .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 16px; color: #666; pointer-events: none; }

        .filter-wrapper { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .btn-filter { background: #fff; border: 3px solid #000; box-shadow: 3px 3px 0px #000; padding: 8px 16px; font-size: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; font-family: inherit; }
        .btn-filter.active { background: var(--yellow); }

        .title-separator { display: flex; align-items: center; margin-bottom: 30px; font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .title-separator span { color: var(--orange); margin-right: 15px; font-size: 14px; }
        .title-separator .line { flex-grow: 1; height: 3px; background: #000; margin-left: 20px; }

        .paste-grid { display: grid; grid-template-columns: 1fr; gap: 25px; margin-bottom: 40px; }
        .paste-card { 
            background: #fff; 
            border: 4px solid #000; 
            box-shadow: 6px 6px 0px #000; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            cursor: pointer; 
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .paste-card:active { transform: translate(2px, 2px); box-shadow: 4px 4px 0px #000; }

        .card-top { background: #000; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        .mac-dots { display: flex; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #ff5f56; }
        .dot.y { background: #ffbd2e; } .dot.g { background: #27c93f; }
        .lang-badge { background: var(--yellow); color: #000; padding: 3px 8px; font-size: 11px; border: 2px solid #000; text-transform: lowercase; font-weight: 900; }
        .card-body { padding: 20px; background: #fff; border-bottom: 4px solid #000; }
        .card-title { margin: 0 0 15px 0; font-size: 16px; font-weight: 900; text-transform: lowercase; cursor: pointer; display: inline-block; }
        .card-title:hover { color: var(--orange); }
        .preview-box { background: #0b0c10; color: #fff; padding: 15px; font-size: 12px; overflow: hidden; white-space: pre-wrap; font-family: monospace; border: 3px solid #000; height: 70px; box-sizing: border-box; }
        .card-footer { background: var(--bg-main); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .card-footer-info { display: flex; align-items: center; gap: 15px; color: #333; }
        .btn-raw { background: var(--yellow); color: #000; text-decoration: none; padding: 5px 12px; border: 3px solid #000; box-shadow: 2px 2px 0px #000; font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 4px; }

        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 40px auto 20px auto;
            flex-wrap: wrap;
        }
        .page-btn {
            background: #ffffff;
            color: #000000;
            border: 3px solid #000000;
            border-radius: 12px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 3px 3px 0px #000000;
            transition: transform 0.05s, box-shadow 0.05s;
            font-family: inherit;
        }
        .page-btn:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000000;
        }
        .page-btn.active {
            background: #ffe359;
            box-shadow: 3px 3px 0px #000000;
        }
        .page-btn:disabled {
            background: #e8e7e1;
            color: #a1a09b;
            border-color: #a1a09b;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
        .page-dots-separator {
            font-weight: 900;
            font-size: 16px;
            color: #000;
            padding: 0 5px;
        }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1001; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }

        .btn-back { display: inline-block; background: #fff; border: 3px solid #000; box-shadow: 3px 3px 0px #000; padding: 10px 18px; text-decoration: none; color: #000; margin-bottom: 25px; font-size: 12px; font-weight: 900; }
        .detail-header { background: #fff; border: 4px solid #000; box-shadow: 6px 6px 0px #000; padding: 25px; margin-bottom: 25px; position: relative; }
        .detail-header-top { display: flex; justify-content: space-between; align-items: flex-start; }

        .code-window { background: #0b0c10; border: 4px solid #000; box-shadow: 8px 8px 0px #000; margin-bottom: 30px; overflow: hidden; contain: content; }
        .window-top { 
            background: #f5f4ef; 
            padding: 12px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 4px solid #000; 
            color: #000; 
            font-size: 12px; 
            flex-wrap: wrap;
            gap: 12px;
        }

        .action-menubar { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            width: 100%; 
            background: transparent; 
            padding: 0; 
            border: none;
        }
        .action-menubar-row-2 {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
        }

        .btn-brutalism {
            background: #fff;
            color: #000;
            border: 4px solid #000;
            box-shadow: 4px 4px 0px #000;
            padding: 12px 8px;
            font-size: 11px;
            font-weight: 900;
            font-family: inherit;
            text-transform: uppercase;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.05s, box-shadow 0.05s;
        }
        .btn-brutalism:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }
        .btn-brutalism.yellow-accent { background: var(--yellow); }
        .btn-brutalism.black-accent { background: #000; color: #fff; }
        .btn-brutalism.black-accent:hover { color: #fff; }

        .raw-modal-content {
            background: #f5f4ef;
            border: 4px solid #000000;
            color: #000000;
            max-width: 650px;
            padding: 0;
            overflow: hidden;
            box-shadow: 8px 8px 0px #000000;
            border-radius: 12px;
        }
        .raw-modal-header {
            background: var(--yellow); 
            padding: 15px 20px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            border-bottom: 4px solid #000000;
        }
        .raw-modal-title {
            color: #000000;
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .raw-modal-body {
            padding: 20px;
            background: #ffffff;
        }
        .raw-textarea-box {
            width: 100%;
            height: 280px;
            background: #1e1e24; 
            color: #39ff14; 
            border: 3px solid #000000;
            box-sizing: border-box;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            font-weight: bold;
            resize: none;
            outline: none;
            line-height: 1.6;
            box-shadow: inset 3px 3px 0px rgba(0,0,0,0.2);
        }
        .raw-modal-footer {
            background: #f5f4ef;
            padding: 15px 20px;
            display: flex;
            justify-content: flex-end; 
            gap: 10px;
            border-top: 4px solid #000000;
        }

        .alert-modal-content {
            background: #ffffff;
            color: #000000;
            border: 4px solid #000000;
            border-radius: 16px;
            max-width: 420px;
            padding: 30px;
            box-shadow: 6px 6px 0px #000000;
            text-align: left;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }
        .alert-modal-content::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: var(--orange);
        }
        .alert-modal-text {
            font-size: 16px;
            font-weight: 900;
            line-height: 1.5;
            margin-top: 10px;
            margin-bottom: 25px;
            color: #000000;
        }
        .alert-modal-btn-container {
            display: flex;
            justify-content: flex-end; 
            margin-top: 20px;
        }
        .btn-alert-oke {
            background: var(--yellow);
            color: #000000;
            border: 3px solid #000000;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 900;
            cursor: pointer;
            padding: 8px 24px;
            text-transform: uppercase;
            box-shadow: 3px 3px 0px #000000;
            transition: transform 0.05s, box-shadow 0.05s;
        }
        .btn-alert-oke:hover {
            background: var(--orange);
            color: #ffffff;
        }
        .btn-alert-oke:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000000;
        }

        .code-window pre[class*="language-"] { 
            max-height: 550px !important; 
            overflow-y: auto !important; 
            overflow-x: auto !important; 
            margin: 0 !important; 
            background: #0b0c10 !important; 
            will-change: transform; 
            -webkit-overflow-scrolling: touch; 
        }
        pre[class*="language-"].line-numbers { padding-left: 3.8em !important; font-size: 13px; }
        .footer { background: #0b0c10; color: #777; padding: 30px 20px; text-align: center; border-top: 4px solid #000; font-size: 12px; margin-top: 60px; font-weight: bold; }

        body.raw-mode-active { background: #fff !important; background-image: none !important; color: #000 !important; font-family: monospace !important; padding: 15px !important; font-weight: normal !important; padding-top: 15px !important; }
        body.raw-mode-active .top-left-nav, body.raw-mode-active .footer, body.raw-mode-active .modal { display: none !important; }
        body.raw-mode-active .container { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }

        .heavy-code-warning {
            background: #ffcbd1;
            border: 3px solid #000;
            padding: 8px 12px;
            margin-bottom: 15px;
            font-size: 11px;
            color: #b70000;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>

<div class="top-left-nav">
    <a href="/" class="btn-nav-top">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24" style="width:14px; height:14px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Kembali
    </a>

    <button id="translateBtn" class="btn-nav-top accent" onclick="toggleLanguageSystem()">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24" style="width:14px; height:14px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 5c-.417-.497-.815-1.034-1.185-1.604M14.5 16h6M17.5 13v6M4.5 18l4.5-4 4.5 4" />
        </svg>
        <span id="translate-btn-text">EN</span>
    </button>
</div>

<div class="container" id="page-content">
    <div style="text-align:center; padding:40px;" id="loading-text">Mengambil data Server...</div>
</div>

<div class="modal" id="rawModal">
    <div class="modal-content raw-modal-content">
        <div class="raw-modal-header">
            <div class="raw-modal-title">📄 <span id="raw-modal-title-text">RAW - PREVIEW</span></div>
        </div>
        <div class="raw-modal-body">
            <textarea id="raw-textarea-display" class="raw-textarea-box" readonly></textarea>
        </div>
        <div class="raw-modal-footer">
            <button class="btn-brutalism" style="padding: 8px 20px;" onclick="closeRawModal()">TUTUP</button>
            <button class="btn-brutalism yellow-accent" style="padding: 8px 20px;" onclick="copyRawInsideModal()">📋 SALIN RAW</button>
        </div>
    </div>
</div>

<div class="modal" id="alertModal" style="background: rgba(0,0,0,0.6);">
    <div class="modal-content alert-modal-content">
        <div class="alert-modal-text" id="alertModalMessage">Aksi berhasil dilakukan!</div>
        <div class="alert-modal-btn-container">
            <button class="btn-alert-oke" onclick="closeAlertModal()">Oke</button>
        </div>
    </div>
</div>

<div class="footer">
    <p>© 2026 Arulz-XD API · <span id="lbl-footer-text">Dibuat untuk Developer Indonesia</span></p>
</div>

<script>
    const GITHUB_RAW_URL = "https://raw.githubusercontent.com/arulzzzxd/api-arulzxd-vvipclouds/main/database/data.js";

    const translations = {
        id: {
            heroTitle: "<span>Snippet</span> & Kode", heroDesc: "Kumpulan kode, script, dan snippet dari tim Arulz-XD. Gratis, langsung pakai.",
            stat1: "Total Paste", stat2: "Bahasa", stat4: "Total Baris",
            searchPlaceholder: "Cari paste berdasarkan judul, bahasa, atau deskripsi...", filterAll: "Semua", sepText: "Semua Paste", noData: "Data tidak ditemukan.",
            lblFooterText: "Dibuat untuk Developer Indonesia", alertSuccessCopy: "Kode berhasil disalin!", 
            btnBack: "← KEMBALI KE PASTEBIN", lblLines: "baris", btnCopy: "🗎 SALIN KODE", 
            btnRaw: "📄 RAW", btnShare: "🗀 SHARE", alertShare: "Link berhasil disalin ke clipboard!", btnDownload: "📥 DOWNLOAD",
            btnPrev: "← Sebelumnya", btnNext: "Berikutnya →"
        },
        en: {
            heroTitle: "<span>Snippet</span> & Code", heroDesc: "Collection of codes, scripts, and snippets from the over-XD team. Free, ready to use.",
            stat1: "Total Pastes", stat2: "Languages", stat4: "Total Lines",
            searchPlaceholder: "Search paste by title, language, or description...", filterAll: "All", sepText: "All Pastes", noData: "Data not found.",
            lblFooterText: "Created for Indonesian Developers", alertSuccessCopy: "Code successfully copied!", 
            btnBack: "← BACK TO PASTEBIN", lblLines: "lines", btnCopy: " COPY CODE", 
            btnRaw: "📄 RAW", btnShare: "🗀 SHARE", alertShare: "Link copied to clipboard!", btnDownload: "📥 DOWNLOAD",
            btnPrev: "← Previous", btnNext: "Next →"
        }
    };

    let currentLang = localStorage.getItem('arulzxd_lang') || 'id';
    let pastes = [];

    let currentPage = 1;
    const itemsPerPage = 4; 

    const urlParams = new URLSearchParams(window.location.search);
    const viewId = urlParams.get('id');
    const isRawMode = urlParams.get('raw') === 'true'; 
    let currentFilter = 'ALL';

    function customAlert(message) {
        document.getElementById('alertModalMessage').innerText = message;
        document.getElementById('alertModal').style.display = 'flex';
    }

    function closeAlertModal() {
        document.getElementById('alertModal').style.display = 'none';
    }

    function setScrollMarker() {
        sessionStorage.setItem('triggerScrollToPastes', 'true');
    }

    async function loadPastesFromServer() {
        try {
            const response = await fetch(GITHUB_RAW_URL);
            if (!response.ok) throw new Error(`HTTP status: ${response.status}`);
            const fileContent = await response.text();

            let jsonString = fileContent.replace(/^(let|const|var|window)\s+\w+\s*=\s*/, '').trim();
            if (jsonString.endsWith(';')) {
                jsonString = jsonString.slice(0, -1);
            }

            pastes = JSON.parse(jsonString);
            localStorage.setItem('arulzxd_pastes', JSON.stringify(pastes));
        } catch (err) {
            console.error("Gagal memuat GitHub Raw, beralih ke local storage...", err);
            const rawLocal = localStorage.getItem('arulzxd_pastes');
            try { 
                pastes = rawLocal ? JSON.parse(rawLocal) : []; 
            } catch(e) { 
                pastes = []; 
            }
        }

        if (!pastes || !Array.isArray(pastes)) {
            pastes = [];
        }

        renderPage();

        const checkScrollMarker = sessionStorage.getItem('triggerScrollToPastes');
        if (checkScrollMarker === 'true' && !viewId) {
            sessionStorage.removeItem('triggerScrollToPastes'); 

            setTimeout(() => {
                const targetSeparator = document.querySelector('.title-separator');
                if (targetSeparator) {
                    targetSeparator.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 300);
        }
    }

    // Fungsi Pengganti Bahasa Lewat Tombol Baru
    function toggleLanguageSystem() {
        const nextLang = currentLang === 'id' ? 'en' : 'id';
        changeLanguage(nextLang);
    }

    function changeLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('arulzxd_lang', lang);
        
        // Perbarui teks tombol translate pojok kiri atas (menampilkan bahasa opsi berikutnya)
        const btnText = document.getElementById('translate-btn-text');
        if(btnText) {
            btnText.innerText = lang === 'id' ? 'EN' : 'ID';
        }

        applyStaticTranslations();
        renderPage();
    }

    function applyStaticTranslations() {
        const t = translations[currentLang];
        if(document.getElementById('lbl-footer-text')) document.getElementById('lbl-footer-text').innerText = t.lblFooterText;
    }

    function openRawModal() {
        const idx = pastes.findIndex(p => p.id.toString() === viewId.toString());
        if(idx !== -1) {
            const current = pastes[idx];
            document.getElementById('raw-modal-title-text').innerText = `RAW - ${current.title.toUpperCase()}`;
            document.getElementById('raw-textarea-display').value = current.content;
            document.getElementById('rawModal').style.display = 'flex';
        }
    }

    function closeRawModal() {
        document.getElementById('rawModal').style.display = 'none';
    }

    function copyRawInsideModal() {
        const txt = document.getElementById('raw-textarea-display').value;
        navigator.clipboard.writeText(txt).then(() => {
            customAlert(translations[currentLang].alertSuccessCopy);
            closeRawModal();
        });
    }

    function downloadCode() {
        const idx = pastes.findIndex(p => p.id.toString() === viewId.toString());
        if(idx !== -1) {
            const current = pastes[idx];
            const element = document.createElement("a");
            const file = new Blob([current.content], {type: 'text/plain'});
            element.href = URL.createObjectURL(file);
            element.download = `${current.title.replace(/\s+/g, '_').toLowerCase()}.txt`;
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }
    }

    function renderPage() {
        const target = document.getElementById('page-content');
        if (!target) return;

        const t = translations[currentLang];

        if (pastes.length === 0 && !viewId) {
            target.innerHTML = `<div style="text-align:center; padding:40px; border:4px dashed #000; background:#fff;">${t.noData} <br><small style="color:#777; margin-top:10px; display:block;">Silakan periksa kembali file data.js di repositori GitHub Anda.</small></div>`;
            return;
        }

        if (viewId && isRawMode) {
            const current = pastes.find(p => p.id.toString() === viewId.toString());
            if (!current) { document.body.innerHTML = "Data tidak ditemukan."; return; }
            document.body.classList.add('raw-mode-active');

            const containerPre = document.createElement('pre');
            containerPre.style.cssText = "margin: 0; white-space: pre-wrap; font-family: monospace; font-size: 14px; word-wrap: break-word;";
            containerPre.textContent = current.content;
            document.body.innerHTML = '';
            document.body.appendChild(containerPre);
            return;
        }

        if (viewId) {
            const idx = pastes.findIndex(p => p.id.toString() === viewId.toString());
            if (idx === -1) {
                target.innerHTML = `<h2>Data tidak ditemukan!</h2><a href="/pastecode" class="btn-back">Kembali</a>`;
                return;
            }

            const current = pastes[idx];
            const lineCount = current.content ? current.content.split('\n').length : 0;
            const isHeavyCode = lineCount > 3000 || (current.content && current.content.length > 150000);

            target.innerHTML = `
                <a href="/pastecode" class="btn-back">${t.btnBack}</a>
                <div class="detail-header">
                    <div class="detail-header-top">
                        <div style="flex-grow: 1; padding-right: 20px;">
                            <h2 style="margin:0 0 10px 0; font-size:24px; color:#000;">${current.title}</h2>
                            <p style="margin:0 0 15px 0; font-size:14px; color:#666; font-weight:normal;">${current.desc || 'Tidak ada deskripsi.'}</p>
                        </div>
                        <div>
                            <div class="detail-lang-badge" style="background: var(--yellow); color: #000; padding: 4px 10px; border: 3px solid #000; font-weight: 900; font-size: 13px;">${current.language}</div>
                        </div>
                    </div>
                    <div style="font-size:12px; color:#555; margin-top: 10px;">📅 ${current.date} · &lt;/&gt; ${lineCount.toLocaleString()} ${t.lblLines}</div>
                </div>

                ${isHeavyCode ? `
                    <div class="heavy-code-warning">
                        ⚠️ File besar terdeteksi (${lineCount.toLocaleString()} baris). Syntax highlighting otomatis dimatikan demi kelancaran rendering layar.
                    </div>
                ` : ''}

                <div style="margin-bottom: 20px;">
                    <div class="action-menubar">
                        <button class="btn-brutalism yellow-accent" onclick="copyText()">🗎 ${t.btnCopy}</button>
                        <button class="btn-brutalism" onclick="downloadCode()">📥 DOWNLOAD</button>
                        <button class="btn-brutalism" onclick="openRawModal()">📄 RAW</button>
                    </div>
                    <div class="action-menubar-row-2">
                        <button class="btn-brutalism" onclick="copyRawUrl()">🔗 RAW URL</button>
                        <button class="btn-brutalism black-accent" onclick="sharePaste()">🔗 SHARE</button>
                    </div>
                </div>

                <div class="code-window">
                    <div class="window-top">
                        <div class="mac-dots"><div class="dot"></div><div class="dot y"></div><div class="dot g"></div></div>
                        <div style="font-size: 11px; font-weight: 900; letter-spacing: 0.5px;">&lt;/&gt; ${current.language.toUpperCase()} MODE</div>
                    </div>
                    <pre class="${isHeavyCode ? '' : 'line-numbers'} language-${isHeavyCode ? 'plaintext' : current.language}"><code id="code-block"></code></pre>
                </div>
            `;

            document.getElementById('code-block').textContent = current.content || '';
            if (!isHeavyCode && typeof Prism !== 'undefined') {
                Prism.highlightAll();
            }

        } else {
            let totalLines = 0;
            let langs = {};

            pastes.forEach(p => {
                if(p.content) totalLines += p.content.split('\n').length;
                langs[p.language] = true;
            });

            let totalLanguagesCount = Object.keys(langs).length;
            if (totalLanguagesCount < 2) totalLanguagesCount = 2;

            target.innerHTML = `
                <div class="hero-banner">
                    <div class="hero-tag">Arulz-XD Pastebin</div>
                    <h1>${t.heroTitle}</h1>
                    <p>${t.heroDesc}</p>
                </div>

                <div class="stats-grid">
                    <div class="stat-box left"><h2>${pastes.length}</h2><p>${t.stat1}</p></div>
                    <div class="stat-box center"><h2>${totalLanguagesCount}</h2><p>${t.stat2}</p></div>
                    <div class="stat-box"><h2>${totalLines.toLocaleString()}</h2><p>${t.stat4}</p></div>
                </div>

                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search-bar" class="search-input" placeholder="${t.searchPlaceholder}" oninput="handleSearch()">
                </div>

                <div class="filter-wrapper">
                    <button class="btn-filter id-filter-all active" onclick="filterLanguage('ALL')">${t.filterAll}</button>
                    <button class="btn-filter id-filter-javascript" onclick="filterLanguage('javascript')">JavaScript</button>
                    <button class="btn-filter id-filter-html" onclick="filterLanguage('html')">HTML</button>
                    <button class="btn-filter id-filter-php" onclick="filterLanguage('php')">PHP</button>
                    <button class="btn-filter id-filter-python" onclick="filterLanguage('python')">Python</button>
                    <button class="btn-filter id-filter-plaintext" onclick="filterLanguage('plaintext')">Plaintext</button>
                </div>

                <div class="title-separator"><span>//</span> ${t.sepText} (<span id="total-paste-text">${pastes.length}</span> Paste) <div class="line"></div></div>

                <div class="paste-grid" id="grid-list"></div>

                <div class="pagination-container" id="pagination-wrapper"></div>
            `;
            applyFilterAndSearch();
        }
    }

    function renderGridItems(items) {
        const grid = document.getElementById('grid-list');
        if(!grid) return;
        grid.innerHTML = '';
        if(items.length === 0) {
            grid.innerHTML = `<div style="text-align:center; padding:40px; border:4px dashed #000; background:#fff;">${translations[currentLang].noData}</div>`;
            document.getElementById('pagination-wrapper').innerHTML = '';
            return;
        }

        const totalPages = Math.ceil(items.length / itemsPerPage);
        if (currentPage > totalPages) currentPage = totalPages || 1;

        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const paginatedItems = items.slice(startIndex, endIndex);

        let htmlCards = '';
        paginatedItems.forEach(p => {
            const contentPreview = p.content ? p.content.substring(0, 120) : '';
            htmlCards += `
                <div class="paste-card" onclick="window.location.href='/pastecode?id=${p.id}'">
                    <div class="card-top">
                        <div class="mac-dots"><div class="dot"></div><div class="dot y"></div><div class="dot g"></div></div>
                        <div class="lang-badge">${p.language}</div>
                    </div>
                    <div class="card-body">
                        <h3 class="card-title" style="margin:0 0 15px 0;">${p.title}</h3>
                        <div class="preview-box">${escapeHTML(contentPreview)}</div>
                    </div>
                    <div class="card-footer">
                        <div class="card-footer-info">
                            <span>📅 ${p.date}</span>
                        </div>
                        <a href="/pastecode?id=${p.id}&raw=true" target="_blank" class="btn-raw" onclick="event.stopPropagation();">📄 RAW</a>
                    </div>
                </div>
            `;
        });
        grid.innerHTML = htmlCards;

        renderPaginationControls(totalPages, items);
    }

    function renderPaginationControls(totalPages, currentItems) {
        const wrapper = document.getElementById('pagination-wrapper');
        if (!wrapper) return;
        wrapper.innerHTML = '';

        const t = translations[currentLang];

        const prevBtn = document.createElement('button');
        prevBtn.className = 'page-btn';
        prevBtn.innerText = t.btnPrev;
        prevBtn.disabled = currentPage === 1;
        prevBtn.onclick = () => {
            if (currentPage > 1) {
                currentPage--;
                renderGridItems(currentItems);
                window.scrollTo({ top: 400, behavior: 'smooth' });
            }
        };
        wrapper.appendChild(prevBtn);

        const maxPagesToShow = Math.min(totalPages, 5);

        for (let i = 1; i <= maxPagesToShow; i++) {
            if (maxPagesToShow === 5 && i === 5 && totalPages > 5) {
                const dots = document.createElement('span');
                dots.className = 'page-dots-separator';
                dots.innerText = '...';
                wrapper.appendChild(dots);
            }

            const pageBtn = document.createElement('button');
            pageBtn.className = `page-btn ${currentPage === i ? 'active' : ''}`;
            pageBtn.innerText = i;
            pageBtn.onclick = () => {
                currentPage = i;
                renderGridItems(currentItems);
                window.scrollTo({ top: 400, behavior: 'smooth' });
            };
            wrapper.appendChild(pageBtn);
        }

        const nextBtn = document.createElement('button');
        nextBtn.className = 'page-btn';
        nextBtn.innerText = t.btnNext;
        nextBtn.disabled = currentPage === totalPages || currentPage >= 5;
        nextBtn.onclick = () => {
            if (currentPage < totalPages && currentPage < 5) {
                currentPage++;
                renderGridItems(currentItems);
                window.scrollTo({ top: 400, behavior: 'smooth' });
            }
        };
        wrapper.appendChild(nextBtn);
    }

    function filterLanguage(lang) {
        currentFilter = lang;
        currentPage = 1; 
        document.querySelectorAll('.filter-wrapper .btn-filter').forEach(b => b.classList.remove('active'));
        const activeBtn = document.querySelector(`.id-filter-${lang.toLowerCase()}`);
        if (activeBtn) {
            activeBtn.classList.add('active');
        }
        applyFilterAndSearch();
    }

    function copyRawUrl() {
        const rawUrl = window.location.origin + "/pastecode?id=" + viewId + "&raw=true";
        navigator.clipboard.writeText(rawUrl).then(() => {
            customAlert(translations[currentLang].alertShare);
        });
    }

    function sharePaste() {
        const currentViewId = new URLSearchParams(window.location.search).get('id');
        if (!currentViewId) return;

        const idx = pastes.findIndex(p => p.id.toString() === currentViewId.toString());
        if (idx !== -1) {
            const current = pastes[idx];
            const shareUrl = window.location.origin + "/pastecode?id=" + currentViewId;
            
            if (navigator.share) {
                navigator.share({
                    title: current.title,
                    text: current.desc || `Lihat kode ${current.title} di Arulz-XD Pastebin!`,
                    url: shareUrl
                })
                .then(() => console.log('Berhasil membagikan!'))
                .catch((error) => console.log('Batal membagikan:', error));
            } else {
                navigator.clipboard.writeText(shareUrl).then(() => {
                    customAlert(translations[currentLang].alertShare);
                });
            }
        } else {
            customAlert("Gagal membagikan: Data tidak ditemukan.");
        }
    }

    function handleSearch() { 
        currentPage = 1; 
        applyFilterAndSearch(); 
    }

    function applyFilterAndSearch() {
        const searchBar = document.getElementById('search-bar');
        const query = searchBar ? searchBar.value.toLowerCase() : "";
        let filtered = pastes;

        if (currentFilter !== 'ALL') {
            filtered = filtered.filter(p => p.language && p.language.toLowerCase() === currentFilter.toLowerCase());
        }
        if (query) {
            filtered = filtered.filter(p => 
                (p.title && p.title.toLowerCase().includes(query)) || 
                (p.desc && p.desc.toLowerCase().includes(query)) ||
                (p.language && p.language.toLowerCase().includes(query))
            );
        }
        const totalText = document.getElementById('total-paste-text');
        if(totalText) totalText.innerText = filtered.length;
        renderGridItems(filtered);
    }

    function escapeHTML(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function copyText() {
        const idx = pastes.findIndex(p => p.id.toString() === viewId.toString());
        if(idx !== -1) {
            const txt = pastes[idx].content;
            navigator.clipboard.writeText(txt).then(() => customAlert(translations[currentLang].alertSuccessCopy));
        }
    }

    window.onload = function() {
        // Terapkan penamaan awal tombol translate berdasarkan locale yang tersimpan
        const btnText = document.getElementById('translate-btn-text');
        if(btnText) {
            btnText.innerText = currentLang === 'id' ? 'EN' : 'ID';
        }
        applyStaticTranslations();
        loadPastesFromServer(); 
    };
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
