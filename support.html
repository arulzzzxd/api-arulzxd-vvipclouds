<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arulz-XD API - Support & Donasi</title>

    <meta property="og:title" content="Support & Donasi — Arulz-XD API">
    <meta property="og:description" content="Suka sama project ini? Yuk support seikhlasnya buat biaya perpanjangan hosting server + nambahin fitur & snippet baru.">
    <meta property="og:image" content="https://arulz-uploader.vercel.app/files/CVmlrD.jpg">
    <meta property="og:url" content="https://arul-pastecode.vercel.app/support">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg-main: #0B0F19; /* Gelap Cyberpunk */
            --bg-card: rgba(17, 24, 39, 0.7); /* Transparan Glassmorphism */
            --border-neon: rgba(0, 212, 255, 0.2); 
            --cyan: #00D4FF;
            --cyan-hover: #00B9E0;
            --text-primary: #E5E7EB;
            --text-muted: #9CA3AF;
        }
        
        * {
            box-sizing: border-box;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(rgba(0, 212, 255, 0.05) 1.5px, transparent 1.5px),
                linear-gradient(to bottom, #0B0F19, #05070B);
            background-size: 24px 24px, 100% 100%;
            color: var(--text-primary); 
            margin: 0; 
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-neon);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
        }

        /* Efek garis aksen cyber di bagian atas card */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #00D4FF, #005F73);
        }

        /* Header Style */
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 8px;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
            text-align: center;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        /* QRIS Frame Box */
        .qris-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px dashed rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .qris-image {
            width: 100%;
            max-width: 280px;
            height: auto;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Buttons Style */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 12px;
            border: none;
        }

        .btn-primary {
            background: var(--cyan);
            color: #05070B;
            box-shadow: 0 4px 14px rgba(0, 212, 255, 0.3);
        }

        .btn-primary:hover {
            background: var(--cyan-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--cyan);
            color: var(--cyan);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Info Badge / Nominal */
        .info-badge {
            background: rgba(0, 212, 255, 0.06);
            border: 1px solid rgba(0, 212, 255, 0.15);
            color: var(--cyan);
            font-family: 'JetBrains Mono', monospace;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 12px;
        }

        /* Custom Alert Notification */
        .custom-alert {
            position: fixed;
            bottom: 24px;
            left: 51%;
            transform: translateX(-50%) translateY(100px);
            background: #0B0F19;
            border: 1px solid var(--cyan);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
            padding: 16px 20px;
            border-radius: 10px;
            z-index: 9999;
            width: 90%;
            max-width: 380px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            opacity: 0;
            pointer-events: none;
        }

        .custom-alert.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .alert-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--cyan);
            margin-bottom: 4px;
        }

        .alert-msg {
            font-size: 0.85rem;
            color: var(--text-primary);
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Support & Donasi</h1>
        <div class="subtitle">
            Suka sama project ini? Yuk support seikhlasnya buat biaya perpanjangan hosting server + nambahin fitur &amp; snippet baru.
        </div>

        <div class="qris-box">
            <img src="https://arulz-uploader.vercel.app/files/CVmlrD.jpg" alt="QRIS Arulz-XD" class="qris-image" id="qrisImg">
            <div class="info-badge">
                💵 Minimal Donasi: Rp1.000,-
            </div>
        </div>

        <button class="btn btn-primary" id="downloadBtn" onclick="downloadQris()">
            📥 Simpan QRIS ke Galeri
        </button>

        <button class="btn btn-secondary" onclick="shareLink()">
            🔗 Bagikan Link Ini
        </button>
    </div>

    <div class="custom-alert" id="customAlert">
        <div class="alert-title" id="alertTitle">Notifikasi</div>
        <div class="alert-msg" id="alertMsg">Pesan sukses disini.</div>
    </div>

    <script>
        function showAlert(title, message) {
            const alertBox = document.getElementById('customAlert');
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertMsg').innerText = message;
            
            alertBox.classList.add('show');
            
            setTimeout(() => {
                alertBox.classList.remove('show');
            }, 3500);
        }

        async function downloadQris() {
            const btn = document.getElementById('downloadBtn');
            const imgElement = document.getElementById('qrisImg');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = "⏳ Memproses...";
            btn.disabled = true;

            try {
                const response = await fetch(imgElement.src);
                if (!response.ok) throw new Error("Gagal mengambil data gambar.");
                
                const blob = await response.blob();
                const finalBlob = new Blob([blob], { type: 'image/jpeg' });
                
                const downloadUrl = URL.createObjectURL(finalBlob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `qris-arulzxd-${Date.now()}.jpg`;

                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                URL.revokeObjectURL(downloadUrl);

                showAlert("Berhasil 🎉", "QRIS berhasil disimpan ke galeri perangkat Anda.");
            } catch (err) {
                console.error(err);
                showAlert("Gagal ❌", "Gagal mengunduh otomatis. Silakan tekan lama pada gambar lalu pilih 'Simpan Gambar'.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function shareLink() {
            const shareData = {
                title: 'Support — Arulz-XD API',
                text: 'Suka sama project ini? Yuk dukung kelangsungan server & snippet barunya! 👇\n',
                url: window.location.href
            };

            if (navigator.share) {
                navigator.share(shareData)
                    .catch((err) => console.log('Batal membagikan:', err));
            } else {
                navigator.clipboard.writeText(window.location.href).then(() => {
                    showAlert("Disalin 🔗", "Link donasi berhasil disalin ke clipboard!");
                });
            }
        }
    </script>
</body>
</html>
