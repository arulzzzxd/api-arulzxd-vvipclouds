<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload File - ArulzXD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="https://files.catbox.moe/4j9u3m.png">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: {} } }
    </script>
    <style>
        * { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen bg-black text-white flex flex-col items-center justify-center p-4">
    <div class="mb-6">
        <a href="/" class="text-sm text-cyan-400 hover:underline">← Kembali ke Dashboard REST API</a>
    </div>
    
    <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 rounded-xl p-8 shadow-xl">
        <h1 class="text-2xl font-bold text-center mb-6">File Cloud Uploader</h1>
        
        <form id="uploadForm" action="/uploadfile" method="post" encType="multipart/form-data" class="space-y-6">
            <div id="file-drop-area" class="border-2 border-dashed border-zinc-700 rounded-xl p-8 text-center cursor-pointer bg-zinc-950 hover:bg-zinc-800/50 transition">
                <p class="text-md font-medium mb-1">Klik atau seret file Anda ke sini</p>
                <p class="text-xs text-zinc-500">Mendukung semua format file</p>
                <input type="file" name="file" id="fileInput" class="hidden" required />
            </div>

            <div id="preview-area" class="hidden text-center p-4 bg-zinc-950 rounded-lg">
                <span id="file-name" class="text-sm block truncate text-zinc-300"></span>
                <button type="button" id="remove-file" class="mt-2 text-xs text-red-400 hover:underline">Hapus File</button>
            </div>
            
            <button type="submit" id="uploadButton" class="w-full py-3 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-lg transition disabled:opacity-50">Mulai Upload</button>
        </form>
    </div>

    <script>
        const fileDropArea = document.getElementById('file-drop-area');
        const fileInput = document.getElementById('fileInput');
        const previewArea = document.getElementById('preview-area');
        const fileName = document.getElementById('file-name');
        const removeFile = document.getElementById('remove-file');

        fileDropArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length) {
                fileName.textContent = e.target.files[0].name;
                previewArea.classList.remove('hidden');
            }
        });
        removeFile.addEventListener('click', () => {
            fileInput.value = '';
            previewArea.classList.add('hidden');
        });
    </script>
</body>
</html>
