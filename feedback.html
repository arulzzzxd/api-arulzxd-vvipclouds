<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - API-ARULZXD</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #030712;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        .neon-border {
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.15), inset 0 0 15px rgba(6, 182, 212, 0.05);
        }
        .neon-glow {
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.4);
        }
        .neon-text {
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4 relative overflow-x-hidden bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-cyan-950/40 via-slate-950 to-slate-950">

    <!-- Decorative Background Elements -->
    <div class="absolute top-10 left-10 w-72 h-72 bg-cyan-500/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-10 right-10 w-80 h-80 bg-blue-500/5 rounded-full blur-3xl pointer-events-none"></div>

    <div class="w-full max-w-lg bg-slate-900/60 backdrop-blur-xl border border-cyan-500/20 rounded-2xl p-6 md:p-8 neon-border transition-all duration-300 relative z-10">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-cyan-500/10 border border-cyan-500/30 mb-4 shadow-[0_0_15px_rgba(6,182,212,0.2)]">
                <svg class="w-7 h-7 text-cyan-400 animate-pulse" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"></path>
                </svg>
            </div>
            <h1 class="text-2xl md:text-3xl font-bold tracking-tight text-white font-mono uppercase neon-text">
                Kirim <span class="text-cyan-400">Feedback</span>
            </h1>
            <p class="text-xs text-slate-400 mt-2 max-w-sm mx-auto">
                Saran, kritik, laporan bug, atau ulasan Anda sangat berharga bagi pengembangan API-ARULZXD.
            </p>
        </div>

        <!-- Form Feedback -->
        <form id="feedbackForm" class="space-y-5">
            <!-- Nama -->
            <div>
                <label class="block text-xs font-semibold text-cyan-400/90 font-mono uppercase tracking-wider mb-2">Nama / Username</label>
                <div class="relative">
                    <input type="text" name="name" required placeholder="Masukkan nama Anda..." 
                        class="w-full bg-slate-950/80 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500/30 transition-all duration-200">
                </div>
            </div>

            <!-- Email -->
            <div>
                <label class="block text-xs font-semibold text-cyan-400/90 font-mono uppercase tracking-wider mb-2">Alamat Email</label>
                <input type="email" name="email" required placeholder="nama@email.com" 
                    class="w-full bg-slate-950/80 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500/30 transition-all duration-200">
            </div>

            <!-- Tipe Feedback -->
            <div>
                <label class="block text-xs font-semibold text-cyan-400/90 font-mono uppercase tracking-wider mb-2">Kategori</label>
                <select name="category" required 
                    class="w-full bg-slate-950/80 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-300 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500/30 transition-all duration-200 appearance-none cursor-pointer">
                    <option value="Saran & Kritik" class="bg-slate-950 text-white">💡 Saran & Kritik</option>
                    <option value="Laporan Bug" class="bg-slate-950 text-white">🪲 Laporan Bug / Error</option>
                    <option value="Request Fitur/API" class="bg-slate-950 text-white">✨ Request Fitur / API Baru</option>
                    <option value="Lainnya" class="bg-slate-950 text-white">💬 Lainnya</option>
                </select>
            </div>

            <!-- Pesan -->
            <div>
                <label class="block text-xs font-semibold text-cyan-400/90 font-mono uppercase tracking-wider mb-2">Isi Feedback</label>
                <textarea name="message" rows="4" required placeholder="Tuliskan ulasan atau detail masalah Anda di sini..." 
                    class="w-full bg-slate-950/80 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500/30 transition-all duration-200 resize-none"></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn"
                class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-slate-950 font-bold font-mono text-sm py-3 px-4 rounded-xl shadow-lg hover:shadow-cyan-500/20 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 cursor-pointer mt-2 group">
                <span>KIRIM FEEDBACK</span>
                <svg class="w-4 h-4 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                </svg>
            </button>
        </form>

        <!-- Status Notification Box -->
        <div id="statusBox" class="mt-4 p-3.5 rounded-xl text-center text-xs font-medium border hidden transition-all duration-300"></div>

        <!-- Back Link -->
        <div class="mt-6 text-center">
            <a href="/" class="text-xs text-slate-500 hover:text-cyan-400 font-mono transition-colors duration-200 inline-flex items-center gap-1.5">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Kembali ke Dashboard
            </a>
        </div>
    </div>

    <!-- Script Handling -->
    <script>
        document.getElementById('feedbackForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const form = e.target;
            const submitBtn = document.getElementById('submitBtn');
            const statusBox = document.getElementById('statusBox');
            
            // UI Loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-slate-950" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>MEMPROSES...</span>
            `;
            
            const formData = {
                name: form.name.value,
                email: form.email.value,
                category: form.category.value,
                message: form.message.value
            };

            try {
                const response = await fetch('/api/feedback', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                statusBox.classList.remove('hidden', 'bg-red-950/30', 'border-red-500/30', 'text-red-400', 'bg-emerald-950/30', 'border-emerald-500/30', 'text-emerald-400');

                if (response.ok && result.success) {
                    statusBox.classList.add('bg-emerald-950/30', 'border-emerald-500/30', 'text-emerald-400');
                    statusBox.innerHTML = '✨ Feedback Anda berhasil dikirim langsung ke Admin! Terima kasih.';
                    form.reset();
                } else {
                    throw new Error(result.message || 'Gagal mengirim feedback.');
                }
            } catch (error) {
                statusBox.classList.add('bg-red-950/30', 'border-red-500/30', 'text-red-400');
                statusBox.innerHTML = `❌ Error: ${error.message || 'Terjadi kesalahan jaringan.'}`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `
                    <span>KIRIM FEEDBACK</span>
                    <svg class="w-4 h-4 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                `;
            }
        });
    </script>
</body>
</html>
